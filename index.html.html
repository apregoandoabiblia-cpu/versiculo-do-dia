<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Versículo do Dia - Apregoando a Bíblia</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/*
  Estratégia: html/body têm exatamente o tamanho do card.
  Card = quadrado de 100vmin (menor dim da tela), max 520px.
  Sem margens, sem fundo visível fora do card.
*/
html{
  background:transparent;
  width:min(520px,100vmin);
  height:min(520px,100vmin);
}
body{
  width:100%;height:100%;
  overflow:hidden;
  background:transparent;
  font-family:'Lato',sans-serif;
  color:#f5e8d0;
}

.card{
  width:100%;height:100%;
  position:relative;
  background:
    radial-gradient(circle at 15% 15%, rgba(212,160,80,0.12) 0%, transparent 50%),
    linear-gradient(160deg,#1a120b 0%,#23190f 45%,#0d0905 100%);
  overflow:hidden;
  animation:cardEnter 1.2s cubic-bezier(0.2,0.8,0.2,1) both;
  box-shadow:0 20px 60px rgba(0,0,0,0.7),inset 0 0 0 1px rgba(180,130,40,0.2);
}
@keyframes cardEnter{
  from{opacity:0;transform:scale(0.96) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.frame-outer{position:absolute;inset:10px;border:1px solid rgba(180,130,40,0.35);border-radius:5px;z-index:2;pointer-events:none}
.frame-inner{position:absolute;inset:17px;border:1px solid rgba(180,130,40,0.12);border-radius:3px;z-index:2;pointer-events:none}

.corner{position:absolute;width:min(35px,6.5vmin);height:min(35px,6.5vmin);z-index:3}
.corner.tl{top:6px;left:6px}
.corner.tr{top:6px;right:6px;transform:scaleX(-1)}
.corner.bl{bottom:6px;left:6px;transform:scaleY(-1)}
.corner.br{bottom:6px;right:6px;transform:scale(-1,-1)}

.inner{
  position:relative;z-index:4;
  padding:min(40px,7vmin) min(44px,8vmin) min(44px,8vmin);
  height:100%;
  display:flex;flex-direction:column;
}

.topo{
  display:flex;justify-content:space-between;align-items:center;
  gap:6px;flex-wrap:nowrap;
  margin-bottom:min(14px,2.5vmin);
  min-width:0;
}
.topo-esq{display:flex;align-items:center;gap:min(10px,1.8vmin);min-width:0;flex:1;overflow:hidden}

.logo{
  width:min(46px,8.5vmin);height:min(46px,8.5vmin);
  object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.6));
}
.texto-superior{
  font-size:clamp(7px,1.9vmin,10px);font-weight:400;text-transform:uppercase;
  color:rgba(212,160,80,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}
.nome-ministerio{flex-shrink:1}
.data{
  color:rgba(212,160,80,0.75);text-shadow:0 2px 4px rgba(0,0,0,0.5);
  flex-shrink:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;max-width:48%;
}

.label{
  font-size:min(9px,1.7vmin);font-weight:400;letter-spacing:3px;text-transform:uppercase;
  color:#d4a050;margin:min(10px,1.8vmin) 0;text-align:center;
  display:flex;align-items:center;gap:10px;
}
.label::before,.label::after{content:'';flex:1;height:1px;background:linear-gradient(to var(--dir,right),transparent,rgba(212,160,80,0.3))}
.label::after{--dir:left}

.verso-wrap{
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:min(8px,1.5vmin) 0;
}
.verso{
  font-family:'Georgia',serif;font-style:italic;
  font-size:min(22px,4.2vmin);
  line-height:1.75;color:#f5e8d0;text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,0.4);
  transition:opacity 0.45s ease,transform 0.45s ease,filter 0.45s ease;
  overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;
}

.rodape{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;flex-wrap:nowrap;padding-top:min(12px,2.2vmin);
}
.ref-wrap{flex:1;display:flex;justify-content:flex-end;overflow:hidden;min-width:0}
.ref{
  font-size:min(11px,2vmin);font-weight:700;letter-spacing:1.5px;
  color:#d4a050;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.4s;
}

.btn-main{
  background:rgba(212,160,80,0.06);border:1px solid rgba(212,160,80,0.2);
  color:#d4a050;font-size:min(8px,1.6vmin);letter-spacing:1px;text-transform:uppercase;
  padding:min(8px,1.5vmin) min(14px,2.5vmin);
  border-radius:50px;cursor:pointer;transition:0.3s;
  display:flex;align-items:center;gap:min(6px,1vmin);flex-shrink:0;
  font-family:'Lato',sans-serif;
}
.btn-main svg{width:min(12px,2.2vmin);height:min(12px,2.2vmin)}
.btn-main:hover{background:#d4a050;color:#1a0a00;transform:translateY(-1px)}
.btn-main:focus-visible{outline:2px solid #d4a050;outline-offset:2px}

.btn-refresh{
  background:transparent;border:none;cursor:pointer;
  color:rgba(212,160,80,0.4);transition:0.3s;flex-shrink:0;padding:min(4px,0.8vmin);
}
.btn-refresh svg{width:min(16px,3vmin);height:min(16px,3vmin)}
.btn-refresh:hover{color:#d4a050;transform:rotate(25deg)}
.btn-refresh:focus-visible{outline:2px solid #d4a050;outline-offset:2px;border-radius:50%}

.fade-out{opacity:0;transform:translateY(-4px);filter:blur(3px)}
.fade-in{opacity:1;transform:translateY(0);filter:blur(0)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 0.8s ease}

.status-toast{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:#d4a050;
  padding:7px 14px;border-radius:4px;font-size:11px;
  border-left:3px solid #d4a050;z-index:1000;
  animation:toastIn 0.3s ease;pointer-events:none;white-space:nowrap;
}
@keyframes toastIn{
  from{opacity:0;transform:translate(-50%,16px)}
  to{opacity:1;transform:translate(-50%,0)}
}

/* nome do ministério sempre visível, escala via clamp() */
</style>
</head>
<body>

<div class="card" id="cardElement">
  <div class="frame-outer"></div>
  <div class="frame-inner"></div>

  <div class="corner tl"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><path d="M2 38 L2 2 L38 2" stroke="rgba(180,130,40,0.7)" stroke-width="2"/><circle cx="2" cy="2" r="3" fill="#d4a050"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><path d="M2 38 L2 2 L38 2" stroke="rgba(180,130,40,0.7)" stroke-width="2"/><circle cx="2" cy="2" r="3" fill="#d4a050"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><path d="M2 38 L2 2 L38 2" stroke="rgba(180,130,40,0.7)" stroke-width="2"/><circle cx="2" cy="2" r="3" fill="#d4a050"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><path d="M2 38 L2 2 L38 2" stroke="rgba(180,130,40,0.7)" stroke-width="2"/><circle cx="2" cy="2" r="3" fill="#d4a050"/></svg></div>

  <div class="inner">
    <div class="topo">
      <div class="topo-esq">
        <img class="logo" src="https://static.wixstatic.com/media/48dfee_5d3bcb48e3dd4ee4973a935a77daef67~mv2.png" alt="Logo Apregoando a Bíblia"/>
        <span class="texto-superior nome-ministerio">Apregoando a Bíblia</span>
      </div>
      <span class="texto-superior data" id="data"></span>
    </div>

    <div class="label" aria-hidden="true">Versículo do Dia</div>

    <div class="verso-wrap">
      <p class="verso fade-in" id="verso" aria-live="polite">Buscando alimento...</p>
    </div>

    <div class="rodape">
      <button class="btn-main" onclick="compartilharImagem()" aria-label="Compartilhar versículo como imagem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Compartilhar
      </button>

      <div class="ref-wrap">
        <span class="ref" id="ref" aria-label="Referência bíblica"></span>
      </div>

      <button class="btn-refresh" onclick="trocarVersiculo()" aria-label="Carregar outro versículo">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const URL_JSON='https://48dfee35-9a3c-438b-9088-a41aeca33b15.usrfiles.com/ugd/48dfee_fd1a98ecf7094f07a4e7099e69646a04.json';
let vs=[], idx=-1;

function toast(msg){
  const t=document.createElement('div');
  t.className='status-toast';t.textContent=msg;t.setAttribute('role','status');
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}

function carregarData(){
  const agora=new Date();
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dias=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  document.getElementById('data').textContent=
    `${dias[agora.getDay()]} • ${agora.getDate()} de ${meses[agora.getMonth()]}`;
}

function ajustarFontes(){
  const vEl=document.getElementById('verso');
  const vWrap=vEl.parentElement;
  vEl.style.fontSize='';
  vEl.style.webkitLineClamp='unset';
  const vmin=Math.min(window.innerWidth,window.innerHeight);
  let vSize=Math.min(22,Math.round(vmin*0.042));
  vEl.style.fontSize=vSize+'px';
  while(vEl.scrollHeight>vWrap.clientHeight&&vSize>11){vSize--;vEl.style.fontSize=vSize+'px';}
  if(vEl.scrollHeight>vWrap.clientHeight){
    const lh=parseFloat(getComputedStyle(vEl).lineHeight)||vSize*1.75;
    vEl.style.webkitLineClamp=Math.max(2,Math.floor(vWrap.clientHeight/lh));
  }
  const rEl=document.getElementById('ref');
  const rWrap=rEl.parentElement;
  let rSize=parseFloat(getComputedStyle(rEl).fontSize)||11;
  while(rEl.scrollWidth>rWrap.clientWidth&&rSize>7){rSize-=0.5;rEl.style.fontSize=rSize+'px';}
}

function exibir(v){
  const t=document.getElementById('verso'),r=document.getElementById('ref');
  t.classList.add('fade-out');r.classList.add('fade-out');
  setTimeout(()=>{
    t.textContent=v.texto;r.textContent='— '+v.ref.replace(':','.');
    t.classList.remove('fade-out');r.classList.remove('fade-out');
    t.classList.add('fade-in');r.classList.add('fade-in');
    ajustarFontes();
  },450);
}

async function carregar(){
  carregarData();
  try{
    const r=await fetch(URL_JSON);vs=await r.json();
    const dia=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
    idx=(dia-1)%vs.length;exibir(vs[idx]);
  }catch{
    exibir({texto:'Lâmpada para os meus pés é tua palavra, e luz para o meu caminho.',ref:'Salmos 119.105'});
  }
}

function trocarVersiculo(){
  const ic=document.getElementById('refreshIcon');
  ic.classList.add('spin');setTimeout(()=>ic.classList.remove('spin'),700);
  if(!vs.length)return;
  let n;do{n=Math.floor(Math.random()*vs.length);}while(n===idx&&vs.length>1);
  idx=n;exibir(vs[idx]);
}

async function compartilharImagem(){
  const btn=document.querySelector('.btn-main');
  const orig=btn.innerHTML;
  btn.innerHTML='⌛...';btn.disabled=true;
  try{
    const W=1080,H=1080;
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // Fundo
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#1a120b');g.addColorStop(0.5,'#23190f');g.addColorStop(1,'#0d0905');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const rg=ctx.createRadialGradient(150,150,0,150,150,400);
    rg.addColorStop(0,'rgba(212,160,80,0.15)');rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);

    // Molduras
    ctx.strokeStyle='rgba(180,130,40,0.5)';ctx.lineWidth=6;ctx.strokeRect(40,40,W-80,H-80);
    ctx.strokeStyle='rgba(180,130,40,0.2)';ctx.lineWidth=2;ctx.strokeRect(60,60,W-120,H-120);

    // Logo
    const logoImg=new Image();logoImg.crossOrigin='anonymous';
    logoImg.src=document.querySelector('.logo').src;
    await new Promise(r=>logoImg.onload=r);
    ctx.drawImage(logoImg,100,100,110,110);

    // Nome e data
    ctx.fillStyle='rgba(212,160,80,0.85)';ctx.textAlign='left';ctx.font='700 28px Lato';
    ctx.fillText('APREGOANDO A BÍBLIA',230,150);
    ctx.textAlign='right';ctx.font='400 24px Lato';ctx.fillStyle='rgba(212,160,80,0.8)';
    ctx.fillText(document.getElementById('data').textContent.toUpperCase(),W-100,150);

    // Label com linhas gradiente
    const labelY=260;
    ctx.textAlign='center';ctx.fillStyle='#d4a050';ctx.font='400 22px Lato';
    ctx.fillText('V E R S Í C U L O   D O   D I A',W/2,labelY);
    const lineW=220;
    const lGrad=ctx.createLinearGradient(W/2-lineW-120,0,W/2-120,0);
    lGrad.addColorStop(0,'transparent');lGrad.addColorStop(1,'rgba(212,160,80,0.3)');
    ctx.strokeStyle=lGrad;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W/2-lineW-150,labelY-7);ctx.lineTo(W/2-150,labelY-7);ctx.stroke();
    const rGradL=ctx.createLinearGradient(W/2+150,0,W/2+lineW+150,0);
    rGradL.addColorStop(0,'rgba(212,160,80,0.3)');rGradL.addColorStop(1,'transparent');
    ctx.strokeStyle=rGradL;
    ctx.beginPath();ctx.moveTo(W/2+150,labelY-7);ctx.lineTo(W/2+lineW+150,labelY-7);ctx.stroke();

    // Versículo
    ctx.textAlign='center';ctx.fillStyle='#f5e8d0';ctx.font='italic 54px Georgia';
    const words=vs[idx].texto.split(' ');
    let line='',lines=[],maxW=W-250;
    words.forEach(w=>{const tl=line+w+' ';if(ctx.measureText(tl).width>maxW){lines.push(line);line=w+' ';}else line=tl;});
    lines.push(line);
    const lh=85,startY=H/2-(lines.length*lh)/2+40;
    lines.forEach((l,i)=>ctx.fillText(l.trim(),W/2,startY+i*lh));

    // Referência
    const refFinal=vs[idx].ref.replace(':','.').toUpperCase();
    ctx.fillStyle='#d4a050';ctx.textAlign='center';
    let rS=36;ctx.font='bold '+rS+'px Lato';
    while(ctx.measureText('— '+refFinal).width>(W-250)&&rS>22){rS--;ctx.font='bold '+rS+'px Lato';}
    ctx.fillText('— '+refFinal,W/2,startY+lines.length*lh+85);

    // Compartilhar
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    const file=new File([blob],'Versiculo.png',{type:'image/png'});

    // Tenta share nativo com arquivo (Android/iOS modernos)
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Versículo do Dia',text:'Versículo do dia - apregoandoabiblia.com'});
    }
    // Fallback: abre imagem em nova aba — usuário segura para salvar/compartilhar
    else{
      const url=URL.createObjectURL(blob);
      const aba=window.open(url,'_blank');
      if(!aba) URL.revokeObjectURL(url); // popup bloqueado
    }

  }catch(e){if(e.name!=='AbortError')console.error(e);}
  btn.innerHTML=orig;btn.disabled=false;
}

window.addEventListener('resize',()=>{if(vs.length)ajustarFontes();});
carregar();
</script>
</body>
</html>
